<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polen PR Previews</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.6;
      color: #000;
      background: #fff;
      padding: 2rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2rem;
      font-weight: 400;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    p {
      color: #666;
      margin-bottom: 2rem;
    }

    .back-link {
      color: #000;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      font-size: 0.875rem;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .pr-list {
      display: grid;
      gap: 1rem;
    }

    .pr-item {
      background: white;
      padding: 1.5rem;
      border: 1px solid #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pr-number {
      font-weight: 600;
      color: #000;
    }

    .pr-link {
      background: #000;
      color: #fff;
      text-decoration: none;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s ease;
      border: 1px solid #000;
    }

    .pr-link:hover {
      background: #fff;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      Back to main demos
    </a>
    <h1>Polen PR Previews</h1>
    <p>Preview deployments for open pull requests.</p>
    <div class="pr-list">
      
          <div class="pr-item">
            <span class="pr-number">PR #89</span>
            <a href="/pr-89/" class="pr-link">View Preview →</a>
          </div>
        
    </div>
  </div>
</body>
</html>
